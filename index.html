<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Personales - Sistema de Control</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header bg-primary text-white shadow-sm">
        <div class="container py-4">
            <h1 class="h2 mb-2">
                <i class="bi bi-cash-coin me-2"></i>
                Gastos Personales
            </h1>
            <p class="mb-0 opacity-90">
                <i class="bi bi-bar-chart-line me-1"></i>
                Sistema de control de ingresos y gastos mensuales
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container my-4">
        <!-- Alertas -->
        <div id="alertContainer"></div>

        <!-- Selector de Mes/Año -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="selectMes" class="form-label">
                            <i class="bi bi-calendar-month me-1"></i>
                            Mes
                        </label>
                        <select id="selectMes" class="form-select">
                            <option value="1">Enero</option>
                            <option value="2">Febrero</option>
                            <option value="3">Marzo</option>
                            <option value="4">Abril</option>
                            <option value="5">Mayo</option>
                            <option value="6">Junio</option>
                            <option value="7">Julio</option>
                            <option value="8">Agosto</option>
                            <option value="9">Septiembre</option>
                            <option value="10">Octubre</option>
                            <option value="11">Noviembre</option>
                            <option value="12">Diciembre</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label for="selectAnio" class="form-label">
                            <i class="bi bi-calendar-event me-1"></i>
                            Año
                        </label>
                        <select id="selectAnio" class="form-select">
                            <!-- Se llena dinámicamente con JavaScript -->
                        </select>
                    </div>

                    <div class="col-md-4">
                        <button id="btnCargar" class="btn btn-primary w-100">
                            <i class="bi bi-arrow-clockwise me-2"></i>
                            Cargar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-5 d-none">
            <div class="spinner-border text-primary mb-3" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="text-muted">Cargando datos...</p>
        </div>

        <!-- Contenido Principal -->
        <div id="contenidoPrincipal">
            <!-- Resumen -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h2 class="h5 mb-0">
                        <i class="bi bi-graph-up-arrow me-2"></i>
                        Resumen - <span id="mesAnioActual"></span>
                    </h2>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <!-- Total Ingresos -->
                        <div class="col-md-4">
                            <div class="card border-success h-100">
                                <div class="card-body text-center">
                                    <div class="d-flex align-items-center justify-content-center mb-2">
                                        <i class="bi bi-arrow-up-circle-fill text-success fs-3 me-2"></i>
                                        <small class="text-uppercase fw-bold text-muted">Total Ingresos</small>
                                    </div>
                                    <h3 class="h2 mb-0 text-success" id="totalIngresos">$0,00</h3>
                                </div>
                            </div>
                        </div>

                        <!-- Total Gastos -->
                        <div class="col-md-4">
                            <div class="card border-danger h-100">
                                <div class="card-body text-center">
                                    <div class="d-flex align-items-center justify-content-center mb-2">
                                        <i class="bi bi-arrow-down-circle-fill text-danger fs-3 me-2"></i>
                                        <small class="text-uppercase fw-bold text-muted">Total Gastos</small>
                                    </div>
                                    <h3 class="h2 mb-0 text-danger" id="totalGastos">$0,00</h3>
                                </div>
                            </div>
                        </div>

                        <!-- Saldo -->
                        <div class="col-md-4">
                            <div class="card border-primary h-100" id="cardSaldo">
                                <div class="card-body text-center">
                                    <div class="d-flex align-items-center justify-content-center mb-2">
                                        <i class="bi bi-wallet2 fs-3 me-2" id="iconSaldo"></i>
                                        <small class="text-uppercase fw-bold text-muted">Saldo</small>
                                    </div>
                                    <h3 class="h2 mb-0" id="saldo">$0,00</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de Ingresos -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-success bg-opacity-10 border-success">
                    <h3 class="h6 mb-0 text-success fw-bold">
                        <i class="bi bi-graph-up me-2"></i>
                        INGRESOS
                    </h3>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <tbody id="tablaIngresos">
                                <!-- Se llena dinámicamente con JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Tabla de Gastos -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-danger bg-opacity-10 border-danger">
                    <h3 class="h6 mb-0 text-danger fw-bold">
                        <i class="bi bi-graph-down me-2"></i>
                        GASTOS
                    </h3>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <tbody id="tablaGastos">
                                <!-- Se llena dinámicamente con JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="assets/js/app.js"></script>
</body>
</html>
